%YAML:1.0
---
imu: 1
num_of_cam: 2

imu_topic: "/imu/data_raw"
image0_topic: "/stereo/left/image_raw"
image1_topic: "/stereo/right/image_raw"
output_path: "/mnt/sata4t/ivlab3_data/vins_project/results/vins_eval_results/KAIST_urban39_pankyo"
pose_graph_save_path: "/mnt/sata4t/ivlab3_data/vins_project/results/vins_eval_results/KAIST_urban39_pankyo/pose_graph/"

cam0_calib: "cam0_kaist.yaml"
cam1_calib: "cam1_kaist.yaml"

image_width: 1280
image_height: 560

use_gpu         : 0
use_gpu_acc_flow: 0
use_gpu_ceres   : 0

# 先讓 VINS 以初值為中心去微調，不要先固定死
estimate_extrinsic: 1

# cam0：由 Vehicle2Stereo(以 left cam 為基準) 與 Vehicle2IMU 組出的初值
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -0.00680499, -0.0153215,  0.99985,    1.71239,
           -0.999977,    0.000334627,-0.00680066, 0.247401,
           -0.000230383,-0.999883,  -0.0153234, -0.11589,
            0,           0,          0,          1 ]

# cam1：先用 cam0 + stereo baseline 做近似初值
# 這只是初始化，不是最終真值
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -0.01036, -0.01075,  0.99990,  1.70544,
           -0.99994, -0.00178, -0.01038, -0.22770,
            0.00189, -0.99994, -0.01073, -0.11611,
            0,        0,        0,        1 ]

multiple_thread: 0

max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 1
flow_back: 1

max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

acc_n: 0.1
acc_w: 0.001
gyr_n: 0.001
gyr_w: 0.00001
g_norm: 9.81007
imu_noise_mode: "fog_xsens"

estimate_td: 0
td: 0.0

load_previous_pose_graph: 0
save_image: 1